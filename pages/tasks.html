<!-- Aufgaben: aus zugewiesenen Pflegeplaenen berechnete offene Pflegeaktionen. -->
<section class="view active-view" id="tasksView" aria-labelledby="viewTitle">
  <section class="workspace-panel tasks-panel">
    <div class="section-heading">
      <div>
        <p class="eyebrow">Erinnerungen</p>
        <h3>Aufgaben</h3>
      </div>
      <div class="section-actions">
        <button class="secondary-action" id="openPlansView" type="button">Pflegepläne verwalten</button>
        <span class="tag" id="taskCount">0 Aufgaben</span>
      </div>
    </div>
    <p class="tasks-intro">Hier erscheinen nur Aufgaben für Pflanzen, denen im Dashboard ein Pflegeplan zugewiesen wurde.</p>
    <div class="task-list" id="taskList"></div>
  </section>
</section>
