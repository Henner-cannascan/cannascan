<!-- Einstellungen: systemweite Pflanzenfamilien steuern. -->
<section class="view active-view" id="settingsView" aria-labelledby="viewTitle">
  <section class="workspace-panel settings-panel">
    <div class="section-heading">
      <div>
        <p class="eyebrow">System</p>
        <h3>Pflanzenfamilien</h3>
      </div>
      <span class="tag" id="systemFamilySummary">0 aktiv</span>
    </div>
    <p class="tasks-intro">
      Wähle aus, welche Pflanzenfamilien im System sichtbar sein sollen. Nicht ausgewählte Familien bleiben gespeichert,
      werden aber in Dashboard, Aufgaben, Sortendatenbank, History und Auswahlfeldern ausgeblendet.
    </p>

    <form id="systemFamilyForm" class="settings-form">
      <fieldset class="dialog-fieldset">
        <legend>Aktive Pflanzenfamilien</legend>
        <div class="settings-family-grid" id="systemFamilyOptions"></div>
      </fieldset>
      <div class="dialog-actions inline-actions">
        <button class="primary-action" type="submit">Einstellungen speichern</button>
      </div>
    </form>
  </section>
</section>
